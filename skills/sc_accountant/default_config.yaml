custom_properties:
  - id: auto_sync_interval
    name: Auto-Sync Interval (seconds)
    hint: "How often to sync trades from the SC_LogReader game log. Only applies if SC_LogReader is installed. Set to 0 to disable."
    value: 15
    property_type: number
    required: false

  - id: default_currency_format
    name: Currency Format
    hint: "How to display aUEC amounts in reports."
    property_type: single_select
    value: "full"
    required: false
    options:
      - label: "Full (1,234,567 aUEC)"
        value: "full"
      - label: "Short (1.2M aUEC)"
        value: "short"

  - id: complexity_layer
    name: Complexity Tier
    hint: "Controls which tools the AI suggests. Casual = basic income/expenses. Engaged = adds fleet, positions, planning. Industrial = full feature set including what-if scenarios."
    property_type: single_select
    value: "engaged"
    required: false
    options:
      - label: "Casual"
        value: "casual"
      - label: "Engaged"
        value: "engaged"
      - label: "Industrial"
        value: "industrial"

  - id: announce_trade_opportunities
    name: Announce Trade Opportunities
    hint: "Announce top 5 trade opportunities when arriving at a location with commodity trading. Requires SC_LogReader."
    value: false
    property_type: boolean
    required: false

  - id: futures_auto_generate
    name: Auto-Generate Opportunities
    hint: "Automatically generate trade opportunities when market data refreshes."
    value: true
    property_type: boolean
    required: false

  - id: futures_min_profit
    name: Minimum Profit per SCU (aUEC)
    hint: "Minimum profit per SCU for an opportunity to be generated. Routes with a lower margin per SCU are excluded."
    value: 0
    property_type: number
    required: false

  - id: position_auto_track
    name: Auto-Track Positions
    hint: "Automatically open/close investment positions on commodity trades."
    value: true
    property_type: boolean
    required: false
