module: skills.sc_accountant.main
name: SC_Accountant
display_name: Star Citizen Accountant
author: Mallachi
auto_activate: true
tags:
  - Star Citizen
  - Finance
  - Trading
description:
  en: >
    Corporate accounting system for Star Citizen. Three-statement financial model
    (Income Statement, Balance Sheet, Cash Flow) with per-activity margins,
    asset registry for fleet/equipment P&L, trade position management,
    planning & forecasting tools, and a standalone accounting dashboard.
    All sibling skills (SC_LogReader, UEXCorp) are optional — everything
    works via manual voice entry.
