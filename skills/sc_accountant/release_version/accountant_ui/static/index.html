<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC Accountant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>SC Accountant</h1>
      <span id="balance" class="balance">-- aUEC</span>
    </div>
    <div class="header-right">
      <select id="period-select">
        <option value="today">Today</option>
        <option value="week">Week</option>
        <option value="month" selected>Month</option>
        <option value="quarter">Quarter</option>
        <option value="year">Year</option>
        <option value="all">All Time</option>
      </select>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab active" data-tab="balancesheet">Balance Sheet</button>
    <button class="tab" data-tab="operations">Operations</button>
    <button class="tab" data-tab="ledger">Ledger</button>
    <button class="tab" data-tab="fleet">My Assets</button>
    <button class="tab" data-tab="orders">Orders</button>
    <button class="tab" data-tab="banking">Banking</button>
    <button class="tab" data-tab="portfolio">Portfolio</button>
    <button class="tab" data-tab="opportunities">Opportunities</button>
    <button class="tab" data-tab="group">Group Events</button>
    <button class="tab" data-tab="statistics">Statistics</button>
    <button class="tab" data-tab="about">About</button>
  </nav>

  <main id="content">
    <!-- Tab content rendered by JS -->
    <div class="loading">Loading...</div>
  </main>

  <footer>
    <div class="footer-left">
      <span id="tab-help-text"></span>
    </div>
  </footer>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <form id="modal-form">
        <div id="modal-body" class="modal-body"></div>
        <div class="modal-footer">
          <div id="modal-status" class="modal-status"></div>
          <div class="modal-actions">
            <button type="button" id="modal-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="modal-save" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
