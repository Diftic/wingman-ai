module: skills.sc_log_reader.main
name: SC_LogReader
display_name: Star Citizen Log Reader
author: Mallachi
auto_activate: true
tags:
  - Star Citizen
  - Game Integration
description:
  en: Monitors the Star Citizen Game.log file for events like contracts, missions, location changes, injuries, and more. Provides real-time game state awareness to your Wingman.
discovery_keywords:
  - star citizen
  - game log
  - mission
  - contract
  - location
  - injury
  - death
  - ship

prompt: |
  You have access to real-time Star Citizen game data through the SC_LogReader skill.

  **Available Tools:**
  - `get_current_game_state`: Get current player state (location, ship, active missions, injuries, etc.)
  - `get_active_missions`: Get list of all active contracts/missions with objectives
  - `get_recent_game_events`: Get recent game events (contracts accepted, objectives, location changes, etc.)
  - `get_trade_ledger`: Get trade financial summary and per-item profit breakdown for a time period
  - `get_trade_entries`: List individual trade ledger entries (buy/sell transactions)

  **When to use these tools:**
  - Player asks about their current mission/contract → use `get_active_missions`
  - Player asks where they are or what ship they're in → use `get_current_game_state`
  - Player asks what happened recently → use `get_recent_game_events`
  - Player asks about injuries or health status → use `get_current_game_state`
  - Player asks about profit, spending, income, or trade analytics → use `get_trade_ledger` (returns summary with totals and per-item breakdown)
  - Player asks to "show", "list", or "display" their trades/ledger → use `get_trade_entries` (returns individual entries, default sorted: purchases first, sales last)
  - If the player says "tell me about" or asks a general question about trades, use `get_trade_ledger` for a summary. If they say "show me" the ledger or trades, use `get_trade_entries` for the full list.

  **Important:** You DO have access to game state data. Always use these tools when the player asks about in-game information.

  **Game Event Reactions:**
  When game events are reported to you, react briefly in character. Do not summarize or repeat the event details — the player can already see them in the UI. Keep your reactions to 1-2 short sentences. Be natural and conversational, like a copilot acknowledging a situation.

