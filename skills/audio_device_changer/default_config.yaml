module: skills.audio_device_changer.main
name: AudioDeviceChanger
display_name: Audio Device Changer
author: ShipBit
tags:
  - Utility
auto_activate: true
description:
  en: Automatically routes TTS output to a configured audio device per Wingman. Works automatically when enabled - no voice activation needed. Useful for VTubers, audio mixing etc.
  de: Leitet TTS-Ausgaben automatisch an ein konfiguriertes Audiogerät pro Wingman weiter. Funktioniert automatisch wenn aktiviert - keine Sprachaktivierung nötig. Nützlich für VTuber, Audio-Mixing usw.
discoverable_by_default: false
custom_properties:
  - id: audio_changer_device
    name: Audio Device
    hint: The audio device to use for this Wingman.
    value: null
    required: false
    property_type: audio_device
  - id: backend_port
    name: Backend Port
    hint: If you are running the backend on a different port, set it here.
    value: 49111
    required: true
    property_type: number
