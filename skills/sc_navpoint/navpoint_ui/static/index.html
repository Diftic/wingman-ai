<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC NavPoint HUD</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-title">
      <span class="logo">◈</span>
      <h1>SC NavPoint HUD</h1>
    </div>
    <div class="header-meta" id="status-bar">Ready</div>
  </header>

  <main>
    <!-- Left panel: Waypoint list -->
    <section class="panel panel-waypoints">
      <div class="panel-header">
        <h2>Waypoints</h2>
        <div class="filter-row">
          <select id="server-filter">
            <option value="">All Servers</option>
          </select>
          <button class="btn-icon" onclick="refreshWaypoints()" title="Refresh">↺</button>
        </div>
      </div>
      <div id="waypoint-list" class="waypoint-list">
        <div class="empty-state">No waypoints saved yet.<br>Say "mark location" in game to save one.</div>
      </div>
    </section>

    <!-- Right panel: Navigation -->
    <section class="panel panel-nav">
      <div class="panel-header">
        <h2>Navigation</h2>
        <button class="btn-sm" id="clear-target-btn" onclick="clearTarget()" style="display:none">✕ Clear</button>
      </div>

      <!-- Active target info -->
      <div id="target-card" class="target-card hidden">
        <div class="target-name" id="target-name">—</div>
        <div class="target-meta" id="target-meta"></div>
      </div>
      <div id="no-target-msg" class="no-target-msg">
        Select a waypoint or say<br>"navigate to [name]"
      </div>

      <!-- Compass rose -->
      <div class="compass-wrap" id="compass-wrap">
        <canvas id="compass" width="220" height="220"></canvas>
        <div class="compass-labels">
          <span class="compass-label-n">▲ FWD</span>
        </div>
      </div>

      <!-- Nav data -->
      <div class="nav-data" id="nav-data">
        <div class="nav-row">
          <span class="nav-label">Distance</span>
          <span class="nav-value" id="nav-distance">—</span>
        </div>
        <div class="nav-row">
          <span class="nav-label">Direction</span>
          <span class="nav-value" id="nav-turn">—</span>
        </div>
        <div class="nav-row">
          <span class="nav-label">Elevation</span>
          <span class="nav-value" id="nav-elev">—</span>
        </div>
        <div class="nav-row">
          <span class="nav-label">Bearing</span>
          <span class="nav-value" id="nav-bearing">—</span>
        </div>
      </div>

      <!-- Step-by-step guidance -->
      <div class="guidance-box" id="guidance-box">
        <div class="guidance-title">Route</div>
        <ol id="guidance-steps" class="guidance-steps"></ol>
      </div>

      <!-- Position info -->
      <div class="position-box" id="position-box">
        <div class="guidance-title">Current Position</div>
        <div class="pos-grid" id="pos-grid">—</div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
