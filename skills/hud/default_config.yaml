module: skills.hud.main
name: HUD
display_name: HUD Overlay
auto_activate: true
discoverable_by_default: false
author: JayMatthew
tags:
  - Utility
  - Overlay
description:
  en: Display messages, information panels, progress bars, and timers on a transparent HUD overlay. The HUD server must be enabled in global settings for this skill to work.
  de: Zeige Nachrichten, Informationspanels, Fortschrittsbalken und Timer auf einem transparenten HUD-Overlay an. Der HUD-Server muss in den globalen Einstellungen aktiviert sein.
hint:
  en: Please make sure the HUD server in the global settings is enabled.
  de: Bitte stelle sicher, dass der HUD-Server in den globalen Einstellungen aktiviert ist.
custom_properties:
  - id: chat_anchor
    name: Chat Window Position
    hint: Screen position/anchor for the chat window.
    property_type: single_select
    value: "top_left"
    required: false
    options:
      - label: "Top Left"
        value: "top_left"
      - label: "Top Center"
        value: "top_center"
      - label: "Top Right"
        value: "top_right"
      - label: "Left Center"
        value: "left_center"
      - label: "Center"
        value: "center"
      - label: "Right Center"
        value: "right_center"
      - label: "Bottom Left"
        value: "bottom_left"
      - label: "Bottom Center"
        value: "bottom_center"
      - label: "Bottom Right"
        value: "bottom_right"

  - id: persistent_anchor
    name: Info Panel Position
    hint: Screen position for persistent info panels.
    property_type: single_select
    value: "top_left"
    required: false
    options:
      - label: "Top Left"
        value: "top_left"
      - label: "Top Center"
        value: "top_center"
      - label: "Top Right"
        value: "top_right"
      - label: "Left Center"
        value: "left_center"
      - label: "Center"
        value: "center"
      - label: "Right Center"
        value: "right_center"
      - label: "Bottom Left"
        value: "bottom_left"
      - label: "Bottom Center"
        value: "bottom_center"
      - label: "Bottom Right"
        value: "bottom_right"

  - id: chat_priority
    name: Chat Window Priority
    hint: Stacking priority for the chat window. Higher values appear closer to the anchor point.
    property_type: number
    value: 20
    required: false

  - id: persistent_priority
    name: Info Panel Priority
    hint: Stacking priority for info panels. Higher values appear closer to the anchor point.
    property_type: number
    value: 10
    required: false

  - id: hud_width
    name: Chat Window Width
    hint: Width of the chat window in pixels.
    property_type: number
    value: 400
    required: false

  - id: persistent_width
    name: Info Panel Width
    hint: Width of persistent info panels in pixels.
    property_type: number
    value: 400
    required: false

  - id: hud_max_height
    name: Chat Window Max Height
    hint: Maximum height of the chat window in pixels.
    property_type: number
    value: 600
    required: false

  - id: persistent_max_height
    name: Info Panel Max Height
    hint: Maximum height of persistent info panels in pixels. Content will be clipped if it exceeds this height.
    property_type: number
    value: 600
    required: false

  - id: font_size
    name: Font Size
    hint: Text font size in pixels.
    property_type: number
    value: 16
    required: false

  - id: font_family
    name: Font Family
    hint: "Font family for HUD text. Available options: Segoe UI, Arial, Verdana, Tahoma, Trebuchet MS, Calibri, Consolas, Courier New, Open Sans."
    property_type: single_select
    value: "Segoe UI"
    required: false
    options:
      - label: "Segoe UI"
        value: "Segoe UI"
      - label: "Arial"
        value: "Arial"
      - label: "Verdana"
        value: "Verdana"
      - label: "Tahoma"
        value: "Tahoma"
      - label: "Trebuchet MS"
        value: "Trebuchet MS"
      - label: "Calibri"
        value: "Calibri"
      - label: "Consolas"
        value: "Consolas"
      - label: "Courier New"
        value: "Courier New"

  - id: accent_color
    name: Accent Color
    hint: Accent color for assistant messages and highlights (hex format).
    property_type: color
    value: "#00aaff"
    required: false

  - id: bg_color
    name: Background Color
    hint: Background color of HUD elements (hex format, e.g. #1e212b or #1e212b80 for 50% transparent).
    property_type: color
    value: "#1e212b"
    required: false

  - id: text_color
    name: Text Color
    hint: Main text color (hex format).
    property_type: color
    value: "#f0f0f0"
    required: false

  - id: border_radius
    name: Border Radius
    hint: Corner roundness of HUD elements in pixels.
    property_type: number
    value: 12
    required: false

  - id: content_padding
    name: Content Padding
    hint: Padding inside HUD elements in pixels.
    property_type: number
    value: 16
    required: false

  - id: max_display_time
    name: Audio Wait Time
    hint: Maximum time in seconds to wait for audio playback before auto-hiding messages. If audio doesn't start within this time, the message will be hidden.
    property_type: number
    value: 5
    required: false

  - id: audio_stop_delay
    name: Audio Stop Delay
    hint: Time in seconds to wait after audio playback stops before hiding the message.
    property_type: number
    value: 1
    required: false

  - id: opacity
    name: Opacity
    hint: Transparency of HUD elements (0 = fully transparent, 100 = no transparency).
    property_type: slider
    options:
      - label: "min"
        value: 0
      - label: "max"
        value: 100
      - label: "step"
        value: 1
    value: 85
    required: false

  - id: typewriter_effect
    name: Typewriter Effect
    hint: Animate text appearing character by character.
    property_type: boolean
    value: true
    required: false

  - id: restore_persistent_items
    name: Restore Persistent Items
    hint: Restore info panels and progress bars after restart.
    property_type: boolean
    value: true
    required: false

  - id: show_chat_messages
    name: Show Chat Messages
    hint: When enabled, conversations will appear on the HUD.
    property_type: boolean
    value: true
    required: false

  - id: display_tool_names
    name: Display Tool Names
    hint: Show the actual tool function names instead of skill/source names.
    property_type: boolean
    value: false
    required: false
