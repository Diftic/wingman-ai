module: skills.vision_ai.main
name: VisionAI
display_name: Vision AI
author: ShipBit
tags:
  - Image
  - Utility
description:
  en: Screen vision - analyse what's on your screen, see images, read text, describe visual content.
  de: Bildschirm-Vision - analysiere was auf deinem Screen ist, sieh Bilder, lese Text, beschreibe visuelle Inhalte.
custom_properties:
  - id: display
    name: Display to capture
    property_type: number
    required: true
    value: 1
  - id: show_screenshots
    name: Show screenshots
    property_type: boolean
    required: true
    value: true
