local_llm:
  endpoint: http://localhost:1234/v1 # LMStudio
edge_tts:
  voice: en-US-GuyNeural
elevenlabs:
  model: eleven_multilingual_v2
  output_streaming: true
  latency: 2
  voice:
    name: Adam
  voice_settings:
    stability: 0.71
    similarity_boost: 0.5
    style: 0.0
    use_speaker_boost: true
  use_tts_prompt: true
  tts_prompt: |
    Audio tags are available for expressive speech (v3 model only). Use sparingly for emphasis.

    **Emotional delivery** (place before text):
    [excited] [curious] [sarcastic] [mischievously] [crying] [whispers]

    **Non-verbal sounds** (place naturally in text):
    [laughs] [sighs] [exhales] [snorts]

    **Punctuation for expression:**
    - Ellipses (…) add pauses and weight
    - CAPITALIZATION for emphasis
    - Standard punctuation for natural rhythm

    **Guidelines:**
    - Match tags to your character's voice and personality
    - Use only when emotion genuinely fits the context
    - Most responses need no tags at all
    - One emotional tag per response is usually enough

    **Example:** "[sighs] That was a VERY close call… we barely made it."
hume:
  description: ""
  voice:
    name: ""
    id: ""
    provider: ""
inworld:
  tts_endpoint: https://api.inworld.ai/tts/v1/voice
  model_id: inworld-tts-1
  voice_id: Hades
  audio_config:
    audio_encoding: MP3
    bitrate: 128000
    sample_rate_hertz: 48000
    pitch: 0.0
    speaking_rate: 1.0
  temperature: 0.8
  output_streaming: true
  use_tts_prompt: true
  tts_prompt: |
    You can use audio markups to add emotion and vocal effects to your speech. Use them sparingly for emphasis - not in every response.

    **Emotions** (place at START of text, use only ONE per response):
    [happy] [sad] [angry] [surprised] [fearful] [disgusted]

    **Delivery styles** (place at START of text):
    [laughing] [whispering]

    **Non-verbal sounds** (can be placed anywhere, use sparingly):
    [breathe] [clear_throat] [cough] [laugh] [sigh] [yawn]

    **Guidelines:**
    - Use markups only when they genuinely fit the emotional context
    - Don't overuse - most responses need no markups at all
    - For emotions/delivery: ONE tag at the start, applies to entire response
    - Only use the exact tags listed above - no others exist

    **Examples:**
    - "[happy] Great news, the mission was a success!"
    - "[sigh] Unfortunately, that didn't go as planned."
    - "[clear_throat] Attention please. [laugh] Just kidding, at ease."
