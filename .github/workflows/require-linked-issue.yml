name: Require Linked Issue

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [develop]

jobs:
  check-linked-issue:
    name: Check for linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i;
            const urlPattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+https:\/\/github\.com\/ShipBit\/wingman-ai\/issues\/(\d+)/i;

            if (issuePattern.test(body) || urlPattern.test(body)) {
              console.log('PR body contains a linked issue reference.');
              return;
            }

            // Also check if the PR has linked issues via the GraphQL API
            const query = `query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 1) {
                    totalCount
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.payload.pull_request.number
            });

            const linkedCount = result.repository.pullRequest.closingIssuesReferences.totalCount;
            if (linkedCount > 0) {
              console.log(`PR has ${linkedCount} linked issue(s) via GitHub UI.`);
              return;
            }

            core.setFailed(
              'This PR must be linked to a GitHub issue before it can be merged.\n\n' +
              'Add one of the following to your PR description:\n' +
              '  - Closes #123\n' +
              '  - Fixes #123\n' +
              '  - Resolves #123\n\n' +
              'Or link an issue via the "Development" section in the PR sidebar.'
            );
