name: Build, Sign and Release

on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from system_manager.py
        id: version
        shell: bash
        run: |
          version=$(grep -oE 'LOCAL_VERSION\s*=\s*"[^"]+"' services/system_manager.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.7'

      - name: Create and activate venv
        run: |
          python -m venv venv
          .\venv\Scripts\Activate

      - name: Install Dependencies
        run: |
          .\venv\Scripts\Activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          .\venv\Scripts\Activate
          pyinstaller WingmanAiCore.spec --noconfirm

      - name: Upload Windows Exe Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-build
          path: dist/WingmanAiCore/
          retention-days: 1

  sign-windows-executable:
    needs: build-windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4 # for the action
      - uses: actions/download-artifact@v4
        with:
          name: unsigned-build
          path: WingmanAiCore

      - name: Sign
        env:
          CERTIFICATE_HOST: ${{ secrets.SM_HOST }}
          CERTIFICATE_HOST_API_KEY: ${{ secrets.SM_API_KEY }}
          CERTIFICATE_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
          CLIENT_CERTIFICATE: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          CLIENT_CERTIFICATE_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
        uses: ./.github/actions/code-sign
        with:
          path-to-binary: 'WingmanAiCore/WingmanAiCore.exe'

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WingmanAiCore-${{ needs.build-windows.outputs.version }}-x86_64-pc-windows
          path: WingmanAiCore

      - name: Delete unsigned intermediate artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: unsigned-build

  release:
    needs: [build-windows, sign-windows-executable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WingmanAiCore-${{ needs.build-windows.outputs.version }}-x86_64-pc-windows
          path: .

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            WingmanAiCore-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
