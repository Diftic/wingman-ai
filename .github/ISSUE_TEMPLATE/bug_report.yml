name: Bug Report
description: Report a bug in Wingman AI. Please fill out all required fields to help us investigate.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below so we can reproduce and fix the issue.

        > **WARNING: Do NOT attach or paste your `secrets.yaml` file! It contains API keys and other sensitive credentials.**

  - type: input
    id: version
    attributes:
      label: Wingman AI Version
      description: Which version of Wingman AI are you using? You can find this in the App's global Settings by looking at the highest version number in your APPDATA directory.
      placeholder: e.g. 2.1.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened and what you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug? Be as specific as possible.
      placeholder: |
        1. Open Wingman AI
        2. Go to '...'
        3. Click on '...'
        4. Say: "..."
        5. See error
    validations:
      required: true

  - type: textarea
    id: wingman-config
    attributes:
      label: Wingman Configuration (Wingman.yaml)
      description: |
        Attach your `Wingman.yaml` (where Wingman = the actual name of your Wingman) file from `%APPDATA%/ShipBit/WingmanAI/[version]/configs/[context]` (Windows).
        Drag and drop the file into this field, or paste its contents.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Settings (settings.yaml)
      description: |
        Attach your `settings.yaml` file from `%APPDATA%/ShipBit/WingmanAI/[version]/configs/`.
        Drag and drop the file into this field, or paste its contents.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: log-file
    attributes:
      label: Log File
      description: |
        Attach your log file from `%APPDATA%/ShipBit/WingmanAI/[version]/logs/`.
        Drag and drop the file into this field, or paste its contents.
        If the log is very long, include at least the relevant section around the error.
        Make sure you search for the conversation causing the error in the log to ensure it's the right one!
      render: text
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Error Messages
      description: |
        If applicable, add screenshots of the error, a demo conversation, or anything else that helps illustrate the problem.
        Drag and drop images into this field.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem (OS version, audio device, specific Wingman/AI provider, etc.).
    validations:
      required: false

  - type: checkboxes
    id: secrets-check
    attributes:
      label: Secrets Check
      description: Please confirm you are NOT including sensitive information.
      options:
        - label: I confirm that I have NOT included my `secrets.yaml` or any API keys in this report.
          required: true
